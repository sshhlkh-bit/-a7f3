// Функція для випадкового перемішування питань (щоб вони не йшли блоками)
function shuffle(array) {
  for (let i = array.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [array[i], array[j]] = [array[j], array[i]];
  }
  return array;
}

let scores = { O: 0, C: 0, E: 0, A: 0, N: 0 };
let rawAnswers = {}; // Зберігання текстів питань та відповідей користувача

function showN(txt) {
  const n = document.getElementById('tgNotif');
  document.getElementById('tgMsg').innerHTML = txt;
  n.classList.add('active');
  setTimeout(() => n.classList.remove('active'), 8000);
}

function startTest() {
  const n = document.getElementById('uName').value.trim();
  const p = document.getElementById('uPhone').value.trim();
  if(n.length < 2) {
    alert("Будь ласка, вкажіть ваше ім'я");
    return;
  }
  
  // Робимо ім'я з великої літери
  uName = n.charAt(0).toUpperCase() + n.slice(1); 
  uPhone = p;
  
  document.getElementById('step-reg').style.display = 'none';
  document.getElementById('step-test').style.display = 'block';
  
  showN(`Привіт, ${uName}! 👋<br>Відповідайте інтуїтивно. Довго не задумуйтеся — перша реакція найточніша.`);
  render();
}

function render() {
  if(cur >= questions.length) return finish();

  const q = questions[cur];
  
  // Прогрес бар
  document.getElementById('pFill').style.width = (cur / questions.length * 100) + "%";

  // Вивід тільки питання, без нумерації!
  let h = `<div class="q-text">${q.text}</div><div class="options">`;
  h += `<button class="opt-btn" onclick="next(1)">Повністю не згоден</button>`;
  h += `<button class="opt-btn" onclick="next(2)">Швидше не згоден</button>`;
  h += `<button class="opt-btn" onclick="next(3)">Нейтрально</button>`;
  h += `<button class="opt-btn" onclick="next(4)">Швидше згоден</button>`;
  h += `<button class="opt-btn" onclick="next(5)">Повністю згоден</button>`;

  document.getElementById('qArea').innerHTML = h + `</div>`;
}

function next(val) {
  const q = questions[cur];
  
  // Записуємо текст питання і бал у об'єкт для відправки (беремо текст прямо з масиву)
  rawAnswers[q.text] = val;

  // Якщо питання зворотне, інвертуємо бал (5->1, 4->2, 3->3, 2->4, 1->5)
  let points = q.reverse ? (6 - val) : val;
  scores[q.trait] += points;
  
  cur++; 
  render();
}

function finish() {
  // Ховаємо тест, показуємо фінальний екран з подякою
  document.getElementById('step-test').style.display = 'none';
  document.getElementById('step-final').style.display = 'block';
  document.getElementById('resName').innerText = uName;

  const traitsList = ['E', 'A', 'C', 'N', 'O'];
  traitsList.forEach(trait => {
    textAnalyticsForDB += `${trait}: ${scores[trait]}/120 | `;
  });

  // Дані для відправки
  const dataToSend = {
    name: uName,
    phone: uPhone,
    scoresText: textAnalyticsForDB, 
    scoresObj: scores,              // Передаємо об'єкт з балами для Google Doc аналізу
    answers: JSON.stringify(rawAnswers) // Всі 120 відповідей
  };

  // Відправка
  if(WEBHOOK_URL.includes("script.google.com")) {
    fetch(WEBHOOK_URL, { 
      method: "POST", 
      mode: "no-cors", 
      body: JSON.stringify(dataToSend) 
    }).catch(err => console.log("Помилка відправки", err));
  }
}
</script>
